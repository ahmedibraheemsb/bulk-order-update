<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bulk Order Update</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0d;
    --bg-card: #161618;
    --bg-input: #1e1e21;
    --border: #2a2a2e;
    --text: #f5f5f5;
    --text-dim: #8b8b8f;
    --accent: #f43f5e;
    --success: #22c55e;
    --success-glow: rgba(34,197,94,0.15);
    --error: #ef4444;
    --error-glow: rgba(239,68,68,0.15);
    --scanner: #00d4ff;
    --orange: #f59e0b;
    --orange-glow: rgba(245,158,11,0.15);
    --purple: #8b5cf6;
    --purple-glow: rgba(139,92,246,0.15);
    --pink: #ec4899;
    --pink-glow: rgba(236,72,153,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1rem;
  }

  .container { max-width: 500px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 1.5rem; }
  .header h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.3rem; }
  .header p { color: var(--text-dim); font-size: 0.85rem; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
  }

  .card-title {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .status-selector {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
  }

  .status-btn {
    padding: 0.6rem 0.3rem;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid var(--border);
    background: var(--bg-input);
    color: var(--text-dim);
    transition: all 0.2s;
    text-align: center;
  }

  .status-btn .icon { font-size: 1.1rem; display: block; margin-bottom: 0.2rem; }
  .status-btn:hover { border-color: var(--text-dim); }

  .status-btn.Shipped.active   { border-color: var(--scanner); background: rgba(0,212,255,0.15); color: var(--scanner); }
  .status-btn.Delivered.active { border-color: var(--success); background: var(--success-glow); color: var(--success); }
  .status-btn.Returned.active  { border-color: var(--orange);  background: var(--orange-glow);  color: var(--orange); }
  .status-btn.Cancelled.active { border-color: var(--error);   background: var(--error-glow);   color: var(--error); }
  .status-btn.Ready.active     { border-color: var(--purple);  background: var(--purple-glow);  color: var(--purple); }

  .courier-selector {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.5rem;
  }

  .courier-btn {
    padding: 0.7rem 0.5rem;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    border: 2px solid var(--border);
    background: var(--bg-input);
    color: var(--text-dim);
    transition: all 0.2s;
    text-align: center;
  }

  .courier-btn:hover { border-color: var(--text-dim); }
  .courier-btn.active { border-color: var(--pink); background: var(--pink-glow); color: var(--pink); }

  .order-input-wrap { position: relative; }

  textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 0.85rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    line-height: 1.8;
    resize: vertical;
    min-height: 140px;
    outline: none;
    direction: ltr;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-dim); font-size: 0.8rem; }

  .order-count-badge {
    display: inline-block;
    background: rgba(244,63,94,0.15);
    color: var(--accent);
    border: 1px solid rgba(244,63,94,0.3);
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.2rem 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 0.5rem;
  }

  .input-hint { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.5rem; text-align: center; }

  .summary-box {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .summary-row { display: flex; justify-content: space-between; padding: 0.3rem 0; font-size: 0.85rem; }
  .summary-label { color: var(--text-dim); }
  .summary-value { font-weight: 600; }
  .summary-value.status  { color: var(--scanner); }
  .summary-value.courier { color: var(--pink); }
  .summary-value.count   { color: var(--accent); }

  .settings-toggle {
    width: 100%;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.6rem;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    margin-bottom: 0.75rem;
  }

  .settings-content { display: none; margin-bottom: 1rem; }
  .settings-content.active { display: block; }

  .input-group { margin-bottom: 0.75rem; }
  .input-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.3rem; }

  .input-group input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    outline: none;
  }

  .input-group input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    padding: 1rem;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: var(--accent);
    color: white;
    margin-bottom: 0.75rem;
    transition: all 0.2s;
  }

  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary.Shipped   { background: var(--scanner); color: #000; }
  .btn-primary.Delivered { background: var(--success); }
  .btn-primary.Returned  { background: var(--orange); }
  .btn-primary.Cancelled { background: var(--error); }
  .btn-primary.Ready     { background: var(--purple); }

  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 0.75rem; display: none; }
  .progress-bar.active { display: block; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }

  .results { display: none; }
  .results.active { display: block; }

  .results-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; }
  .stat-success { color: var(--success); }
  .stat-error   { color: var(--error); }

  .results-list {
    max-height: 220px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .result-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 0.85rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    gap: 0.5rem;
  }

  .result-item:last-child { border-bottom: none; }
  .result-order { font-family: 'JetBrains Mono', monospace; font-weight: 600; flex-shrink: 0; }
  .result-msg { color: var(--text-dim); font-size: 0.8rem; flex: 1; text-align: left; direction: ltr; }

  .result-status { padding: 0.2rem 0.6rem; border-radius: 10px; font-size: 0.75rem; flex-shrink: 0; }
  .result-pending { background: rgba(59,130,246,0.15); color: #3b82f6; }
  .result-success { background: var(--success-glow); color: var(--success); }
  .result-error   { background: var(--error-glow);   color: var(--error); }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid transparent;
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">

  <header class="header">
    <h1>📋 Bulk Order Update</h1>
    <p>تحديث أوردرات بالجملة</p>
  </header>

  <!-- Status -->
  <div class="card">
    <h2 class="card-title">📌 اختر الحالة</h2>
    <div class="status-selector">
      <button class="status-btn Shipped" onclick="selectStatus(this,'Shipped','Shipped','🚚')">
        <span class="icon">🚚</span>Shipped
      </button>
      <button class="status-btn Delivered" onclick="selectStatus(this,'Delivered','Delivered','✅')">
        <span class="icon">✅</span>Delivered
      </button>
      <button class="status-btn Returned" onclick="selectStatus(this,'Returned','Returned','↩️')">
        <span class="icon">↩️</span>Returned
      </button>
      <button class="status-btn Cancelled" onclick="selectStatus(this,'Cancelled','Cancelled','❌')">
        <span class="icon">❌</span>Cancelled
      </button>
      <button class="status-btn Ready" onclick="selectStatus(this,'Ready','Ready','📦')">
        <span class="icon">📦</span>Ready
      </button>
    </div>
  </div>

  <!-- Courier -->
  <div class="card" id="courierCard">
    <h2 class="card-title">🛵 اختر المندوب</h2>
    <div class="courier-selector">
      <button class="courier-btn" data-courier="Bosta"         onclick="selectCourier(this)">Bosta</button>
      <button class="courier-btn"        data-courier="3laa"          onclick="selectCourier(this)">3laa</button>
      <button class="courier-btn"        data-courier="3bdo 3rafa"    onclick="selectCourier(this)">3bdo 3rafa</button>
      <button class="courier-btn"        data-courier="Kareem"        onclick="selectCourier(this)">Kareem</button>
      <button class="courier-btn"        data-courier="Mohamed Tarek" onclick="selectCourier(this)">Mohamed Tarek</button>
      <button class="courier-btn"        data-courier="Magdy"         onclick="selectCourier(this)">Magdy</button>
      <button class="courier-btn"        data-courier="Abo Selim"     onclick="selectCourier(this)">Abo Selim</button>
      <button class="courier-btn"        data-courier="Waleed"        onclick="selectCourier(this)">Waleed</button>
      <button class="courier-btn"        data-courier="3bd Alrahman"  onclick="selectCourier(this)">3bd Alrahman</button>
      <button class="courier-btn"        data-courier="Sobhy"         onclick="selectCourier(this)">Sobhy</button>
      <button class="courier-btn"        data-courier="Abo Yassin"    onclick="selectCourier(this)">Abo Yassin</button>
    </div>
  </div>

  <!-- Order Numbers -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
      <h2 class="card-title" style="margin-bottom:0;">📋 أرقام الأوردرات</h2>
      <span class="order-count-badge" id="orderCount">0 أوردر</span>
    </div>
    <textarea
      id="orderInput"
      placeholder=""
      oninput="parseOrders()"
    ></textarea>
    <p class="input-hint">✦ مقبول: #32101 أو 32101 · سطر جديد أو فاصلة</p>
  </div>

  <!-- Summary -->
  <div class="summary-box">
    <div class="summary-row">
      <span class="summary-label">الحالة:</span>
      <span class="summary-value status" id="summaryStatus">—</span>
    </div>
    <div class="summary-row" id="courierRow">
      <span class="summary-label">المندوب:</span>
      <span class="summary-value courier" id="summaryCourier">—</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">عدد الأوردرات:</span>
      <span class="summary-value count" id="summaryCount">0</span>
    </div>
  </div>

  <!-- Settings -->
  <button class="settings-toggle" onclick="toggleSettings()">⚙️ الإعدادات</button>
  <div class="settings-content" id="settings">
    <div class="card">
      <div class="input-group">
        <label>Worker URL</label>
        <input type="text" id="workerUrl" placeholder="https://your-worker.workers.dev">
      </div>
      <div class="input-group">
        <label>Worker Secret</label>
        <input type="password" id="workerSecret" placeholder="WORKER_SECRET">
      </div>
    </div>
  </div>

  <!-- Action -->
  <button class="btn-primary" id="updateBtn" onclick="startUpdate()">
    🚀 تحديث الكل
  </button>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-header">
      <span>النتائج</span>
      <span>
        <span class="stat-success">✓ <span id="successCount">0</span></span>
        &nbsp;
        <span class="stat-error">✗ <span id="errorCount">0</span></span>
      </span>
    </div>
    <div class="results-list" id="resultsList"></div>
  </div>

</div>
<script>
  let currentSpecifier = '';
  let currentStatusLabel = '';
  let currentIcon = '';
  let currentCourier = '';
  let parsedOrders = [];

  // Load saved settings
  document.getElementById('workerUrl').value    = localStorage.getItem('bulk_worker_url')    || '';
  document.getElementById('workerSecret').value = localStorage.getItem('bulk_worker_secret') || '';

  document.getElementById('workerUrl').addEventListener('change',    e => localStorage.setItem('bulk_worker_url',    e.target.value));
  document.getElementById('workerSecret').addEventListener('change', e => localStorage.setItem('bulk_worker_secret', e.target.value));

  function needsCourier(specifier) {
    return specifier !== 'Ready' && specifier !== 'Cancelled';
  }

  function selectStatus(btn, specifier, label, icon) {
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSpecifier   = specifier;
    currentStatusLabel = label;
    currentIcon        = icon;
    document.getElementById('summaryStatus').textContent = `${icon} ${label}`;
    const cls = specifier === 'Ready' ? 'Ready' : specifier;
    document.getElementById('updateBtn').className = `btn-primary ${cls}`;
    const show = needsCourier(specifier);
    document.getElementById('courierCard').style.display = show ? 'block' : 'none';
    document.getElementById('courierRow').style.display  = show ? 'flex'  : 'none';
  }

  function selectCourier(btn) {
    document.querySelectorAll('.courier-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCourier = btn.dataset.courier;
    document.getElementById('summaryCourier').textContent = `🛵 ${currentCourier}`;
  }

  function parseOrders() {
    const raw = document.getElementById('orderInput').value;
    const tokens = raw.split(/[\n,]+/).map(t => t.trim()).filter(t => t.length > 0);
    const valid = [];
    for (const t of tokens) {
      const num = t.replace(/^#/, '').trim();
      if (/^\d+$/.test(num)) valid.push(`#${num}`);
    }
    parsedOrders = [...new Set(valid)];
    document.getElementById('orderCount').textContent   = `${parsedOrders.length} أوردر`;
    document.getElementById('summaryCount').textContent = parsedOrders.length;
  }

  function toggleSettings() {
    document.getElementById('settings').classList.toggle('active');
  }

  async function startUpdate() {
    const workerUrl    = document.getElementById('workerUrl').value.trim();
    const workerSecret = document.getElementById('workerSecret').value.trim();

    if (!workerUrl || !workerSecret) {
      alert('أدخل Worker URL و Worker Secret في الإعدادات');
      document.getElementById('settings').classList.add('active');
      return;
    }
    if (!currentSpecifier) {
      alert('اختر الحالة أولاً');
      return;
    }
    if (needsCourier(currentSpecifier) && !currentCourier) {
      alert('اختر المندوب أولاً');
      return;
    }
    if (parsedOrders.length === 0) {
      alert('أدخل أرقام الأوردرات أولاً');
      return;
    }

    const confirmMsg = needsCourier(currentSpecifier)
      ? `تحديث ${parsedOrders.length} أوردر؟\nالحالة: ${currentStatusLabel}\nالمندوب: ${currentCourier}`
      : `تحديث ${parsedOrders.length} أوردر؟\nالحالة: ${currentStatusLabel}`;

    if (!confirm(confirmMsg)) return;

    const btn = document.getElementById('updateBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> جاري التحديث...';

    document.getElementById('progressBar').classList.add('active');
    document.getElementById('results').classList.add('active');
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('successCount').textContent = '0';
    document.getElementById('errorCount').textContent   = '0';

    // Show pending items
    const resultsList = document.getElementById('resultsList');
    resultsList.innerHTML = parsedOrders.map(order => `
      <div class="result-item" id="result-${order.replace('#','')}">
        <span class="result-order">${order}</span>
        <span class="result-msg"></span>
        <span class="result-status result-pending">⏳</span>
      </div>
    `).join('');

    try {
      const response = await fetch(workerUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${workerSecret}`,
        },
        body: JSON.stringify({
          orderNumbers: parsedOrders,
          specifier: currentSpecifier,
          courier: needsCourier(currentSpecifier) ? currentCourier : null,
        }),
      });

      const data = await response.json();
      document.getElementById('progressFill').style.width = '100%';

      if (data.results) {
        let success = 0, errors = 0;
        for (const r of data.results) {
          const num = r.orderNumber.replace('#', '');
          const el  = document.getElementById(`result-${num}`);
          if (!el) continue;
          if (r.success) {
            success++;
            el.querySelector('.result-status').className   = 'result-status result-success';
            el.querySelector('.result-status').textContent = '✓';
          } else {
            errors++;
            el.querySelector('.result-status').className   = 'result-status result-error';
            el.querySelector('.result-status').textContent = '✗';
            el.querySelector('.result-msg').textContent    = r.error || '';
          }
        }
        document.getElementById('successCount').textContent = success;
        document.getElementById('errorCount').textContent   = errors;
        if (errors === 0) {
          alert(`✅ تم تحديث ${success} أوردر بنجاح!\nالحالة: ${currentStatusLabel}${needsCourier(currentSpecifier) ? '\nالمندوب: ' + currentCourier : ''}`);
        } else {
          alert(`تم: ${success} ناجح، ${errors} فشل`);
        }
      } else {
        resultsList.innerHTML = `<div class="result-item"><span class="result-msg" style="color:var(--error)">${data.error || 'خطأ غير متوقع'}</span></div>`;
      }
    } catch (err) {
      resultsList.innerHTML = `<div class="result-item"><span class="result-msg" style="color:var(--error)">خطأ في الاتصال: ${err.message}</span></div>`;
    }

    btn.disabled = false;
    btn.innerHTML = '🚀 تحديث الكل';
  }
</script>
</body>
</html>
